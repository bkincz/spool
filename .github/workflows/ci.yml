name: CI

on:
    push:
        branches: [master, main, develop]
    pull_request:
        branches: [master, main, develop]

jobs:
    test:
        name: Test
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                # 22 is the oldest supported line (engines: >=22.12.0).
                node-version: [22, 24]

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm run type-check

            - name: Lint
              run: pnpm run lint

            - name: Format check
              run: pnpm run format:check

            # Coverage runs the whole suite; no separate test run needed.
            - name: Test (with coverage)
              run: pnpm run test:coverage

            - name: Upload coverage to Codecov
              if: matrix.os == 'ubuntu-latest'
              uses: codecov/codecov-action@v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./packages/cli/coverage/lcov.info
                  fail_ci_if_error: false

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: packages/cli/dist
                  retention-days: 7

    # Scaffold a real workspace with the built CLI, install, and build it.
    # Catches upstream vite/plugin releases that break new workspaces.
    smoke:
        name: Smoke (scaffold + install + build)
        runs-on: ${{ matrix.os }}
        needs: test
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build CLI
              run: pnpm run build

            - name: Scaffold a workspace
              shell: bash
              run: node packages/cli/dist/index.js create "$RUNNER_TEMP/smoke" --name smoke --host shell --remotes dashboard --pm pnpm --no-install

            # A fresh scaffold has no lockfile, and pnpm defaults to
            # --frozen-lockfile on CI, which errors when the lockfile is absent.
            - name: Install workspace dependencies
              shell: bash
              working-directory: ${{ runner.temp }}/smoke
              run: pnpm install --no-frozen-lockfile

            - name: Doctor
              shell: bash
              working-directory: ${{ runner.temp }}/smoke
              run: node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" doctor

            - name: Build workspace
              shell: bash
              working-directory: ${{ runner.temp }}/smoke
              run: node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" build

            # Generated files must already satisfy the .prettierrc we ship.
            - name: Check generated formatting
              shell: bash
              working-directory: ${{ runner.temp }}/smoke
              run: pnpm dlx prettier@3 --check .
