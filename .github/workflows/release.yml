name: Release

on:
    push:
        tags:
            - 'v*'

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'pnpm'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # A v1.2.3 tag must publish package version 1.2.3, nothing else.
            - name: Check tag matches package version
              run: |
                  PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
                      echo "Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION"
                      exit 1
                  fi

            - name: Build
              run: pnpm run build

            - name: Run tests
              run: pnpm run test:run

            - name: Publish to npm
              run: pnpm --filter @bkincz/spool publish --provenance --access public --no-git-checks
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  generate_release_notes: true
